# Configuration Nginx pour conta.cd
# À copier dans /etc/nginx/sites-available/conta.cd

# Redirection HTTP vers HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name conta.cd www.conta.cd;
    
    # Pour Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    
    # Redirection vers HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# Configuration HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name conta.cd www.conta.cd;
    
    # SSL Configuration (sera configuré par Certbot)
    # ssl_certificate /etc/letsencrypt/live/conta.cd/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/conta.cd/privkey.pem;
    
    # SSL Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Logs
    access_log /var/log/nginx/conta.cd-access.log;
    error_log /var/log/nginx/conta.cd-error.log;
    
    # Taille maximale des uploads
    client_max_body_size 50M;
    
    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    
    # Fichiers statiques du frontend (logos, favicons, etc.) - Priorité avec ^~
    location ^~ /logo-color.png {
        alias /home/conta/conta.cd/frontend/dist/logo-color.png;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    location ^~ /logo-white.png {
        alias /home/conta/conta.cd/frontend/dist/logo-white.png;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    location ^~ /favicon.ico {
        alias /home/conta/conta.cd/frontend/dist/favicon.ico;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    location ^~ /icon-color.png {
        alias /home/conta/conta.cd/frontend/dist/icon-color.png;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    location ^~ /icon-white.png {
        alias /home/conta/conta.cd/frontend/dist/icon-white.png;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Frontend - React App (fichiers statiques)
    location / {
        root /home/conta/conta.cd/frontend/dist;
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }
    
    # Assets statiques avec cache
    location /assets {
        root /home/conta/conta.cd/frontend/dist;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Backend API
    location /api {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # CORS headers (si nécessaire)
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        add_header Access-Control-Allow-Credentials true always;
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }
    
    # Fichiers statiques - Uploads
    location /uploads {
        alias /home/conta/conta.cd/uploads;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Fichiers statiques - Invoices
    location /invoices {
        alias /home/conta/conta.cd/invoices;
        expires 7d;
        add_header Cache-Control "private";
        # Sécuriser l'accès aux factures (ajouter auth si nécessaire)
    }
    
    
    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;
    gzip_disable "MSIE [1-6]\.";
}

