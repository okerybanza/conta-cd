# Configuration Nginx pour conta.cd - HTTP uniquement (avant SSL)
# À utiliser temporairement pour obtenir les certificats SSL

# Configuration HTTP (sera redirigée vers HTTPS après SSL)
server {
    listen 80;
    listen [::]:80;
    server_name conta.cd www.conta.cd;
    
    # Pour Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    
    # Frontend - React App
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
    
    # Backend API
    location /api {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Fichiers statiques
    location /uploads {
        alias /home/conta/conta.cd/uploads;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    location /invoices {
        alias /home/conta/conta.cd/invoices;
        expires 7d;
        add_header Cache-Control "private";
    }
    
    # Taille maximale des uploads
    client_max_body_size 50M;
    
    # Logs
    access_log /var/log/nginx/conta.cd-access.log;
    error_log /var/log/nginx/conta.cd-error.log;
}

