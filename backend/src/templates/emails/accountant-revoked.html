<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fin de collaboration - Conta</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333; padding: 20px;">
  <div style="max-width: 600px; margin: 0 auto;">
    {{#if platformLogo}}
    <div style="text-align: center; margin-bottom: 20px;">
      <img src="{{platformLogo}}" alt="Conta" style="max-width: 150px; height: auto;">
    </div>
    {{/if}}
    
    
    <h2 style="color: #0D3B66;">Fin de collaboration</h2>
    <p>Bonjour,</p>
    <p>Votre accès en tant qu'expert-comptable pour <strong>{{companyName}}</strong> a été révoqué.</p>
    <p>Cordialement,<br>L'équipe Conta</p>
    
    
    <hr style="border: none; border-top: 1px solid #eee; margin: 30px 0;">
    
    <p style="font-size: 12px; color: #666; margin: 0;">
      Conta - Application de Facturation<br>
      Cet email a été envoyé automatiquement, merci de ne pas y répondre.
    </p>
  </div>
</body>
</html>
